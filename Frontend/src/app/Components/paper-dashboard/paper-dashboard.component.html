<div class="container py-4">
  <h3 class="fw-bold mb-4">Browse Question Papers</h3>

  <!-- Search + Filters -->
  <div class="card p-3 mb-4 shadow-sm">
    <div class="row g-2 align-items-end">
      <div class="col-md-4">
        <label class="form-label small">Search (title / subject / content)</label>
        <input class="form-control" [(ngModel)]="searchQuery"
               placeholder="e.g. Digital Electronics" (keyup.enter)="search()" />
      </div>
      <div class="col-md-2">
        <label class="form-label small">Branch</label>
        <select class="form-select" [(ngModel)]="selectedBranch">
          <option value="">All</option>
          <option *ngFor="let b of branches" [value]="b">{{ b }}</option>
        </select>
      </div>
      <div class="col-md-2">
        <label class="form-label small">Exam Type</label>
        <select class="form-select" [(ngModel)]="selectedExamType">
          <option value="">All</option>
          <option value="MID_SEM">Mid Sem</option>
          <option value="END_SEM">End Sem</option>
        </select>
      </div>
      <div class="col-md-2">
        <label class="form-label small">Year</label>
        <input class="form-control" type="number" [(ngModel)]="selectedYear"
               placeholder="e.g. 2023" min="2000" max="2099" />
      </div>
      <div class="col-md-2 d-flex gap-2">
        <button class="btn btn-primary flex-grow-1" (click)="search()">Search</button>
        <button class="btn btn-outline-secondary" (click)="resetFilters()">Reset</button>
      </div>
    </div>
  </div>

  <!-- Loading / Error -->
  <div class="text-center py-4" *ngIf="loading">
    <div class="spinner-border text-primary"></div>
  </div>
  <div class="alert alert-danger" *ngIf="error && !loading">{{ error }}</div>

  <!-- Results -->
  <div *ngIf="!loading && !error">
    <p class="text-muted small mb-3">{{ totalElements }} paper(s) found</p>

    <div class="row row-cols-1 row-cols-md-2 row-cols-lg-3 g-3" *ngIf="papers.length > 0">
      <div class="col" *ngFor="let paper of papers">
        <div class="card h-100 shadow-sm">
          <div class="card-body d-flex flex-column">
            <div class="d-flex justify-content-between align-items-start mb-2">
              <span class="badge bg-primary">{{ paper.branch }}</span>
              <span class="badge bg-secondary">{{ formatExamType(paper.examType) }}</span>
            </div>
            <h6 class="card-title fw-bold">{{ paper.title }}</h6>
            <p class="card-text text-muted small mb-1">{{ paper.subject }}</p>
            <p class="card-text text-muted small">Year: {{ paper.year }}</p>
            <p class="card-text text-muted small" *ngIf="paper.uploadedBy">
              By: {{ paper.uploadedBy }}
            </p>
            <div class="mt-auto pt-2 d-flex justify-content-between align-items-center">
              <small class="text-muted">&#8595; {{ paper.downloadCount }}</small>
              <button class="btn btn-sm btn-outline-primary" (click)="download(paper)">
                Download PDF
              </button>
            </div>
          </div>
        </div>
      </div>
    </div>

    <div class="text-center py-5 text-muted" *ngIf="papers.length === 0">
      No papers found. Try different filters.
    </div>

    <!-- Pagination -->
    <nav class="mt-4" *ngIf="totalPages > 1">
      <ul class="pagination justify-content-center">
        <li class="page-item" [class.disabled]="currentPage === 0">
          <button class="page-link" (click)="goToPage(currentPage - 1)">Previous</button>
        </li>
        <li class="page-item" *ngFor="let p of pages()"
            [class.active]="p === currentPage">
          <button class="page-link" (click)="goToPage(p)">{{ p + 1 }}</button>
        </li>
        <li class="page-item" [class.disabled]="currentPage === totalPages - 1">
          <button class="page-link" (click)="goToPage(currentPage + 1)">Next</button>
        </li>
      </ul>
    </nav>
  </div>
</div>
