<div class="container py-4" style="max-width: 640px;">
  <h4 class="fw-bold mb-4">My Subject Subscriptions</h4>

  <div class="alert alert-danger" *ngIf="error">{{ error }}</div>

  <!-- Subscribe form -->
  <div class="card p-3 mb-4 shadow-sm">
    <label class="form-label fw-semibold">Subscribe to a subject</label>
    <div class="input-group">
      <input class="form-control" [(ngModel)]="newSubject"
             placeholder="e.g. Digital Electronics"
             (keyup.enter)="subscribe()" />
      <button class="btn btn-primary" (click)="subscribe()" [disabled]="submitting || !newSubject.trim()">
        {{ submitting ? 'Subscribing...' : 'Subscribe' }}
      </button>
    </div>
    <div class="text-muted small mt-1">You'll be notified when new papers are uploaded for this subject.</div>
  </div>

  <!-- Loading -->
  <div class="text-center py-4" *ngIf="loading">
    <div class="spinner-border text-primary"></div>
  </div>

  <!-- Empty -->
  <div class="text-center py-5 text-muted" *ngIf="!loading && subscriptions.length === 0">
    No subscriptions yet. Subscribe to subjects above.
  </div>

  <!-- List -->
  <ul class="list-group" *ngIf="!loading && subscriptions.length > 0">
    <li class="list-group-item d-flex justify-content-between align-items-center"
        *ngFor="let sub of subscriptions">
      <div>
        <span class="fw-semibold">{{ sub.subject }}</span>
        <div class="text-muted small">Since {{ sub.createdAt | date:'mediumDate' }}</div>
      </div>
      <button class="btn btn-outline-danger btn-sm" (click)="unsubscribe(sub.id)">Remove</button>
    </li>
  </ul>
</div>
