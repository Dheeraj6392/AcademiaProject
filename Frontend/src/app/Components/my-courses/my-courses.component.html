<h2 class="display-4 fw-semibold mb-2">My Courses</h2>

<section id="course" class="padding-medium">
  <div class="container">

    <div class="text-center py-4" *ngIf="loading">
      <div class="spinner-border text-primary"></div>
    </div>
    <div class="alert alert-danger" *ngIf="error">{{ error }}</div>

    <!-- Empty state -->
    <div *ngIf="!loading && courses.length === 0" class="text-center py-5">
      <img src="https://cdn-icons-png.flaticon.com/512/4076/4076549.png" alt="No courses" class="mb-4" style="max-width: 140px; opacity: 0.5;" />
      <h5 class="fw-semibold">You haven't enrolled in any courses yet.</h5>
      <p class="text-muted">Browse our catalog and start learning today.</p>
      <a class="btn btn-primary mt-2" routerLink="/courses">Browse Courses</a>
    </div>

    <!-- Enrolled courses grid -->
    <div class="row" *ngIf="!loading && courses.length > 0">
      <div class="col-md-6 col-lg-4 mb-4" *ngFor="let c of courses">
        <div class="course-card card h-100 position-relative">
          <div class="z-1 position-absolute m-3">
            <span class="badge bg-primary">{{ c.weeks }} Weeks</span>
          </div>
          <img [src]="c.imageUrl || 'https://picsum.photos/seed/' + c.id + '/400/300'"
               class="card-img-top object-fit-cover rounded-top" [alt]="c.title" style="height: 160px;" />
          <div class="card-body">
            <h5 class="card-title text-capitalize">{{ c.title }}</h5>
            <p class="card-text text-muted line-clamp-2">{{ c.description }}</p>
            <small class="text-muted">{{ c.lessons }} lessons &bull; {{ c.enrolledCount }} enrolled</small>
            <div class="d-flex gap-2 mt-3">
              <button class="btn btn-outline-danger btn-sm" (click)="unenroll(c)">Unenroll</button>
              <a class="btn btn-outline-secondary btn-sm" routerLink="/courses">Explore More</a>
            </div>
          </div>
        </div>
      </div>
    </div>

  </div>
</section>
