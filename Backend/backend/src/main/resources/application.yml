spring:
  application:
    name: pyq-portal

  config:
    import: optional:classpath:application-local.yml  # loaded if file exists, silently skipped in production

  datasource:
    url: ${SUPABASE_DB_URL:jdbc:postgresql://localhost:5432/pyqportal}
    username: ${SUPABASE_DB_USER:postgres}
    password: ${SUPABASE_DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver

  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  kafka:
    bootstrap-servers: localhost:9092
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
    consumer:
      group-id: index-worker-group
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "com.pyqportal.indexworker"
    listener:
      ack-mode: manual

  data:
    redis:
      host: localhost
      port: 6379

  elasticsearch:
    uris: http://localhost:9200

  servlet:
    multipart:
      max-file-size: 20MB
      max-request-size: 20MB

cloudinary:
  cloud-name: ${CLOUDINARY_CLOUD_NAME:my-cloud}
  api-key: ${CLOUDINARY_API_KEY:my-api-key}
  api-secret: ${CLOUDINARY_API_SECRET:my-api-secret}

jwt:
  secret: ${JWT_SECRET:local-dev-secret-key-must-be-at-least-32-characters-long}
  expiration: 86400000  # 24 hours in ms

server:
  port: 8080

springdoc:
  swagger-ui:
    path: /swagger-ui.html
